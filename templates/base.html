<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{title}} | Zisternen-Ampel</title>
	<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" />
	<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon/favicon-96x96.png') }}" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon/favicon.svg') }}" />
	<link rel="shortcut icon" href="/static/favicon/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}" />
	<meta name="apple-mobile-web-app-title" content="Zisterne" />
	<link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}" />
</head>

<body>
	<ul class="navbar">
		<li><a href="/" {% if navbar_filllevel_selected %} class="active" {% endif %}>Füllstand</a></li>
		<li><a href="/history" {% if navbar_history_selected %} class="active" {% endif %}>Historie</a></li>
		<li style="float: right"><a href="/settings" {% if navbar_settings_selected %} class="active" {% endif
				%}>Einstellungen</a></li>
	</ul>
	<div class="content">
		{% block content %}{% endblock content %}
	</div>
</body>

</html>
